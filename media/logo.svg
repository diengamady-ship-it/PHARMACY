<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#28C8D6" stroke-width="3" opacity="0.6"/>
  <!-- Main white circle -->
  <circle cx="100" cy="100" r="91" fill="white"/>
  <!-- Inner teal ring -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="#28C8D6" stroke-width="3.5"/>

  <!-- Circular text paths -->
  <defs>
    <path id="topCircle" d="M 100,100 m -65,0 a 65,65 0 1,1 130,0"/>
    <path id="botCircle" d="M 100,100 m -58,0 a 58,58 0 0,0 116,0"/>
  </defs>

  <!-- Top arc text: PHARMA HEALTHCARE -->
  <text font-family="Arial Black, Arial" font-weight="900" font-size="13.5" fill="#111111" text-anchor="middle" letter-spacing="1.5">
    <textPath href="#topCircle" startOffset="44%">PHARMA HEALTHCARE</textPath>
  </text>
  <!-- Bottom arc text: ASSISTANCE -->
  <text font-family="Arial Black, Arial" font-weight="900" font-size="13.5" fill="#111111" text-anchor="middle" letter-spacing="2">
    <textPath href="#botCircle" startOffset="50%">ASSISTANCE</textPath>
  </text>

  <!-- Pill icons left -->
  <ellipse cx="30" cy="100" rx="8" ry="4" fill="#8CC63F" transform="rotate(-40 30 100)"/>
  <line x1="30" y1="100" x2="30" y2="100" stroke="white" stroke-width="1.5" transform="rotate(-40 30 100)"/>
  <!-- Pill icons right -->
  <ellipse cx="170" cy="100" rx="8" ry="4" fill="#28C8D6" transform="rotate(40 170 100)"/>

  <!-- Caduceus symbol -->
  <!-- Staff -->
  <line x1="100" y1="30" x2="100" y2="95" stroke="#1A7062" stroke-width="3" stroke-linecap="round"/>
  <!-- Wings -->
  <path d="M100 38 Q82 28 76 32 Q82 40 100 38Z" fill="#1A7062"/>
  <path d="M100 38 Q118 28 124 32 Q118 40 100 38Z" fill="#1A7062"/>
  <!-- Snake 1 -->
  <path d="M97 95 Q88 80 92 68 Q96 56 97 44" fill="none" stroke="#28C8D6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Snake 2 -->
  <path d="M103 95 Q112 80 108 68 Q104 56 103 44" fill="none" stroke="#28C8D6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Snake heads -->
  <circle cx="97" cy="95" r="3" fill="#1A7062"/>
  <circle cx="103" cy="95" r="3" fill="#1A7062"/>

  <!-- Two open hands below caduceus -->
  <!-- Left hand -->
  <path d="M68 130 Q62 118 65 110 Q68 104 72 106 Q70 100 74 98 Q78 97 80 102 Q80 97 84 96 Q88 95 89 101 Q90 97 94 97 Q98 97 98 104 L98 130 Q90 138 82 138 Q72 138 68 130Z" fill="none" stroke="#1A7062" stroke-width="2" stroke-linejoin="round"/>
  <!-- Right hand -->
  <path d="M132 130 Q138 118 135 110 Q132 104 128 106 Q130 100 126 98 Q122 97 120 102 Q120 97 116 96 Q112 95 111 101 Q110 97 106 97 Q102 97 102 104 L102 130 Q110 138 118 138 Q128 138 132 130Z" fill="none" stroke="#1A7062" stroke-width="2" stroke-linejoin="round"/>
</svg>
